<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title th:text="#{email.activation.title}">Account Notification</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="icon" th:href="@{|${baseUrl}/favicon.ico|}" />
  </head>
  <body>
    <h2>🚀 New Account Created</h2>
    <p><strong>Name:</strong> <span th:text="${name}">John Doe</span></p>
    <p><strong>Email:</strong> <span th:text="${email}">johndoe@example.com</span></p>
    <p><strong>Phone:</strong> <span th:href="'tel:' + ${phone}" th:text="${phone}">123-456-7890</span></p>
    <p>
      To see more details, visit the link:
      <a th:with="url=(@{|${baseUrl}/user-profile/${id}/view|})" th:href="${url}" th:text="${url}">User Profile</a>
    </p>
    <hr />
    <p style="font-size: 12px; color: #999">Website Lead Notification System</p>
  </body>
</html>
