<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2 id="jhi-trademark-heading" data-cy="TrademarkCreateUpdateHeading">Create or edit a Trademark</h2>

      <div>
        <jhi-alert-error />

        @if (editForm.controls.id.value !== null) {
          <div class="mb-3">
            <label class="form-label" for="field_id">ID</label>
            <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
          </div>
        }

        <div class="mb-3">
          <label class="form-label" for="field_name">Name</label>
          <input type="text" class="form-control" name="name" id="field_name" data-cy="name" formControlName="name" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_details">Details</label>
          <input type="text" class="form-control" name="details" id="field_details" data-cy="details" formControlName="details" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_applicationNo">Application No</label>
          <input
            type="number"
            class="form-control"
            name="applicationNo"
            id="field_applicationNo"
            data-cy="applicationNo"
            formControlName="applicationNo"
          />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_applicationDate">Application Date</label>
          <div class="input-group">
            <input
              id="field_applicationDate"
              data-cy="applicationDate"
              type="text"
              class="form-control"
              name="applicationDate"
              ngbDatepicker
              #applicationDateDp="ngbDatepicker"
              formControlName="applicationDate"
            />
            <button type="button" class="btn btn-secondary" (click)="applicationDateDp.toggle()">
              <fa-icon icon="calendar-alt"></fa-icon>
            </button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_agentName">Agent Name</label>
          <input type="text" class="form-control" name="agentName" id="field_agentName" data-cy="agentName" formControlName="agentName" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_agentAddress">Agent Address</label>
          <input
            type="text"
            class="form-control"
            name="agentAddress"
            id="field_agentAddress"
            data-cy="agentAddress"
            formControlName="agentAddress"
          />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_proprietorName">Proprietor Name</label>
          <input
            type="text"
            class="form-control"
            name="proprietorName"
            id="field_proprietorName"
            data-cy="proprietorName"
            formControlName="proprietorName"
          />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_proprietorAddress">Proprietor Address</label>
          <input
            type="text"
            class="form-control"
            name="proprietorAddress"
            id="field_proprietorAddress"
            data-cy="proprietorAddress"
            formControlName="proprietorAddress"
          />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_headOffice">Head Office</label>
          <select class="form-control" name="headOffice" formControlName="headOffice" id="field_headOffice" data-cy="headOffice">
            <option [ngValue]="null"></option>
            @for (headOffice of headOfficeValues; track $index) {
              <option [value]="headOffice">
                {{
                  { null: '', DELHI: 'DELHI', MUMBAI: 'MUMBAI', AHMEDABAD: 'AHMEDABAD', KOLKATA: 'KOLKATA', CHENNAI: 'CHENNAI' }[headOffice]
                }}
              </option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_imgUrl">Img Url</label>
          <input type="text" class="form-control" name="imgUrl" id="field_imgUrl" data-cy="imgUrl" formControlName="imgUrl" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_tmClass">Tm Class</label>
          <input type="number" class="form-control" name="tmClass" id="field_tmClass" data-cy="tmClass" formControlName="tmClass" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_journalNo">Journal No</label>
          <input type="number" class="form-control" name="journalNo" id="field_journalNo" data-cy="journalNo" formControlName="journalNo" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_deleted">Deleted</label>
          <input type="checkbox" class="form-check" name="deleted" id="field_deleted" data-cy="deleted" formControlName="deleted" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_usage">Usage</label>
          <input type="text" class="form-control" name="usage" id="field_usage" data-cy="usage" formControlName="usage" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_associatedTms">Associated Tms</label>
          <input
            type="text"
            class="form-control"
            name="associatedTms"
            id="field_associatedTms"
            data-cy="associatedTms"
            formControlName="associatedTms"
          />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_trademarkStatus">Trademark Status</label>
          <input
            type="text"
            class="form-control"
            name="trademarkStatus"
            id="field_trademarkStatus"
            data-cy="trademarkStatus"
            formControlName="trademarkStatus"
          />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_createdDate">Created Date</label>
          <div class="d-flex">
            <input
              id="field_createdDate"
              data-cy="createdDate"
              type="datetime-local"
              class="form-control"
              name="createdDate"
              formControlName="createdDate"
              placeholder="YYYY-MM-DD HH:mm"
            />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_modifiedDate">Modified Date</label>
          <div class="d-flex">
            <input
              id="field_modifiedDate"
              data-cy="modifiedDate"
              type="datetime-local"
              class="form-control"
              name="modifiedDate"
              formControlName="modifiedDate"
              placeholder="YYYY-MM-DD HH:mm"
            />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_renewalDate">Renewal Date</label>
          <div class="input-group">
            <input
              id="field_renewalDate"
              data-cy="renewalDate"
              type="text"
              class="form-control"
              name="renewalDate"
              ngbDatepicker
              #renewalDateDp="ngbDatepicker"
              formControlName="renewalDate"
            />
            <button type="button" class="btn btn-secondary" (click)="renewalDateDp.toggle()">
              <fa-icon icon="calendar-alt"></fa-icon>
            </button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_type">Type</label>
          <select class="form-control" name="type" formControlName="type" id="field_type" data-cy="type">
            <option [ngValue]="null"></option>
            @for (trademarkType of trademarkTypeValues; track $index) {
              <option [value]="trademarkType">
                {{
                  {
                    null: '',
                    IMAGEMARK: 'IMAGEMARK',
                    TRADEMARK: 'TRADEMARK',
                    SOUNDMARK: 'SOUNDMARK',
                    TRADEMARK_WITH_IMAGE: 'TRADEMARK_WITH_IMAGE',
                    SLOGAN: 'SLOGAN',
                  }[trademarkType]
                }}
              </option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_pageNo">Page No</label>
          <input type="number" class="form-control" name="pageNo" id="field_pageNo" data-cy="pageNo" formControlName="pageNo" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_source">Source</label>
          <select class="form-control" name="source" formControlName="source" id="field_source" data-cy="source">
            <option [ngValue]="null"></option>
            @for (trademarkSource of trademarkSourceValues; track $index) {
              <option [value]="trademarkSource">
                {{
                  {
                    null: '',
                    JOURNAL_PUBLICATION: 'JOURNAL_PUBLICATION',
                    EXCEL: 'EXCEL',
                    ADMIN_PORTAL: 'ADMIN_PORTAL',
                    MEMBER_PORTAL: 'MEMBER_PORTAL',
                  }[trademarkSource]
                }}
              </option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_planType">Plan Type</label>
          <select class="form-control" name="planType" formControlName="planType" id="field_planType" data-cy="planType">
            <option [ngValue]="null"></option>
            @for (trademarkPlanType of trademarkPlanTypeValues; track $index) {
              <option [value]="trademarkPlanType">
                {{
                  {
                    null: '',
                    TM_FILING: 'TM_FILING',
                    TM_FILING_AND_FOLLOW_UP: 'TM_FILING_AND_FOLLOW_UP',
                    FOLLOW_UP_ONLY: 'FOLLOW_UP_ONLY',
                  }[trademarkPlanType]
                }}
              </option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_lead">Lead</label>
          <select class="form-control" id="field_lead" data-cy="lead" name="lead" formControlName="lead" [compareWith]="compareLead">
            <option [ngValue]="null"></option>
            @for (leadOption of leadsSharedCollection; track $index) {
              <option [ngValue]="leadOption">{{ leadOption.id }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_user">User</label>
          <select class="form-control" id="field_user" data-cy="user" name="user" formControlName="user" [compareWith]="compareUserProfile">
            <option [ngValue]="null"></option>
            @for (userProfileOption of userProfilesSharedCollection; track $index) {
              <option [ngValue]="userProfileOption">{{ userProfileOption.id }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label for="field_trademarkClasses">Trademark Classes</label>
          <select
            class="form-control"
            id="field_trademarkClasses"
            data-cy="trademarkClasses"
            multiple
            name="trademarkClasses"
            formControlName="trademarkClasses"
            [compareWith]="compareTrademarkClass"
          >
            @for (trademarkClassOption of trademarkClassesSharedCollection; track $index) {
              <option [ngValue]="trademarkClassOption">{{ trademarkClassOption.id }}</option>
            }
          </select>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span>Cancel</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span>Save</span>
        </button>
      </div>
    </form>
  </div>
</div>
