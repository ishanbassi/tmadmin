<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (tmAgent()) {
      <div>
        <h2 data-cy="tmAgentDetailsHeading"><span>Tm Agent</span></h2>

        <hr />

        <jhi-alert-error></jhi-alert-error>

        <jhi-alert></jhi-alert>

        <dl class="row-md jh-entity-details">
          <dt><span>ID</span></dt>
          <dd>
            <span>{{ tmAgent()!.id }}</span>
          </dd>
          <dt><span>Agent Code</span></dt>
          <dd>
            <span>{{ tmAgent()!.agentCode }}</span>
          </dd>
          <dt><span>First Name</span></dt>
          <dd>
            <span>{{ tmAgent()!.firstName }}</span>
          </dd>
          <dt><span>Last Name</span></dt>
          <dd>
            <span>{{ tmAgent()!.lastName }}</span>
          </dd>
          <dt><span>Address</span></dt>
          <dd>
            <span>{{ tmAgent()!.address }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span>Back</span>
        </button>

        <button type="button" [routerLink]="['/tm-agent', tmAgent()!.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span>Edit</span>
        </button>
      </div>
    }
  </div>
</div>
